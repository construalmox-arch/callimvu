<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SQUAD OPS | PROTOCOLO IMVU</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --tetris-green: #39ff14;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 4px solid var(--neon-blue);
            box-shadow: inset 0 0 20px var(--neon-blue);
        }

        /* TELA DE REGRAS (LOBBY) */
        #lobby {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .rules-box {
            border: 3px solid var(--neon-pink);
            background: #111;
            padding: 30px;
            max-width: 600px;
            box-shadow: 10px 10px 0px var(--neon-pink);
        }

        .rules-box h2 { color: var(--neon-pink); font-size: 1.2rem; margin-bottom: 20px; }
        .rules-list { text-align: left; font-size: 0.7rem; line-height: 1.8; margin-bottom: 20px; color: var(--neon-blue); }

        .checkbox-container { font-size: 0.6rem; margin-bottom: 20px; cursor: pointer; }

        .btn-start {
            padding: 20px;
            background: #333;
            color: #666;
            border: 3px solid #666;
            font-family: 'Press Start 2P';
            cursor: not-allowed;
            transition: 0.3s;
        }

        .btn-start.active {
            background: var(--tetris-green);
            color: #000;
            border-color: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px var(--tetris-green);
        }

        /* HEADER E HUD */
        header {
            background: #111;
            padding: 15px;
            border-bottom: 3px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .glitch-text {
            font-size: 0.8rem;
            animation: glitch 2s infinite;
        }

        #meet-container { flex-grow: 1; background: #000; }

        /* ANIMAÇÕES */
        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--neon-pink); }
            50% { text-shadow: -2px -2px var(--neon-blue); }
            100% { text-shadow: 2px 2px var(--neon-pink); }
        }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 243, 255, 0.1);
            position: absolute; top: 0; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scanline"></div>

<div id="lobby">
    <div class="rules-box">
        <h2>[ REGRAS DO ESQUADRÃO ]</h2>
        <div class="rules-list">
            <p>> 01. RESPEITO OBRIGATÓRIO EM CALL.</p>
            <p>> 02. SEM FLOOD DE ÁUDIO OU GRITOS.</p>
            <p>> 03. PROIBIDO DIVULGAR LINKS EXTERNOS.</p>
            <p>> 04. O MODERADOR TEM PODER DE KICK/MUTE.</p>
        </div>
        
        <label class="checkbox-container">
            <input type="checkbox" id="agree-check" onclick="toggleButton()"> EU ACEITO AS DIRETRIZES
        </label>
        <br>
        <button id="start-btn" class="btn-start" onclick="joinCall()" disabled>CONECTAR AGORA</button>
    </div>
</div>

<header>
    <div class="glitch-text">SISTEMA: ONLINE</div>
    <div style="font-size: 0.6rem; color: var(--neon-pink);">PLAYER: JESSÉ (ADMIN)</div>
</header>

<div id="meet-container"></div>

<script>
    function toggleButton() {
        const check = document.getElementById('agree-check');
        const btn = document.getElementById('start-btn');
        if(check.checked) {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }

    function joinCall() {
        document.getElementById('lobby').style.display = 'none';
        
        const domain = "meet.jit.si";
        const options = {
            roomName: "SQUAD_IMVU_2026_PRIVATE",
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#meet-container'),
            lang: 'pt-br',
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: ['microphone', 'camera', 'chat', 'hangup', 'tileview', 'settings'],
                MAIN_TOOLBAR_BUTTONS: ['microphone', 'camera', 'chat'],
                SHOW_JITSI_WATERMARK: false
            },
            configOverwrite: {
                startWithAudioMuted: false,
                disableDeepLinking: true
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
        
        // Notificação de entrada
        api.executeCommand('displayName', 'Recruta do IMVU');
    }
</script>

</body>
</html>
